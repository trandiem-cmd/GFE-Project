<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
        <img src="./Assets/GFE logo.png" alt="GFE logo" class="logo">
        <div class="login-dropdown ms-auto">
            <button class="btn btn-secondary dropdown-toggle login-btn" type="button" data-bs-toggle="dropdown">
            <img src="./Assets/menu-icon.png" class="menu-icon" alt="Menu">
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="./index.html">Home</a></li>
            <li><a class="dropdown-item" href="./about.html">About Us</a></li>
            <li><a class="dropdown-item" href="./contact.html">Contact Us</a></li>
            <li><a class="dropdown-item" href="./faq.html">FAQ</a></li>
            </ul>
        </div>
        </div>
    </nav>
    <div class="content">
        <div class="content-poster">
            <h1>Complete your profile</h1>
            <h2>Tell us a bit about yourself to get started.</h2>
        </div>
        <h5 class="mt-4">Step 1 of 4</h5>
        <div class="progress-custom mb-2">
            <div class="progress-bar-custom1"></div>
        </div>
        <div class="mb-4">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
 
   <div class="profile-card">
  <div style="width: 200px;">
    <h4 class="fw-bold" style="color: #5A3AB0">Profile photo</h4>
    <small>Adding a photo helps clients recognize you and builds trust before reaching out.</small>
  </div>
  <div class="profile-photo">
    <div class="photo-box" onclick="document.getElementById('photoInput').click()" style="cursor:pointer;">
      <i class="bi bi-camera camera-icon"></i>
      <i class="bi bi-person person-icon"></i>
      <img id="previewPhoto" src="" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:8px;">
    </div>
    <input type="file" id="photoInput" accept="image/*" style="display:none;">
    <button class="btn mb-4 upload-btn" onclick="document.getElementById('photoInput').click()">Upload photo</button>
  </div>
</div>
    <h4 class="fw-bold mt-4">About you</h4>
      <form id="profileForm">
        <div class="mb-3">
            <input type="text" class="form-control" id="name" placeholder="Full name">
        </div>
        <div class="mb-3">
            <input type="email" class="form-control" id="contact-email" placeholder="Email">
        </div>
        <div class="mb-3">
            <input type="text" class="form-control" id="contact-phone" placeholder="Phone number">
        </div>
        <div class="mb-3">
            <div class="location-wrapper">
            
            <input type="text" id="location" class="form-control" placeholder="Select location" readonly>

            <div id="locationDropdown" class="dropdown-box d-none">
              <select id="city" class="form-select mb-2">
                <option value="">Select city</option>
                <option value="Helsinki">Helsinki</option>
                <option value="Espoo">Espoo</option>
                <option value="Vantaa">Vantaa</option>
                <option value="Tampere">Tampere</option>
                <option value="Turku">Turku</option>
                <option value="Oulu">Oulu</option>
              </select>

              <select id="district" class="form-select">
                <option value="">Select district</option>
              </select>
            </div>
        </div>
          <button type="button"  class="btn w-100 mb-3 next-btn" id="next1-btn2" style="margin: 30px 0px;">Next →</button>
      </form>
    <p class="add-logo">
      <img src="./Assets/GFE logo.png" alt="GFE logo" class="logo">
    </p>
    <footer class="footer">

  <div class="footer-links">
    <a href="./about.html">About us</a>
    <a href="./contact.html">Contact us</a>
    <a href="./faq.html">FAQ</a>
  </div>

  <div class="footer-line"></div>

  <p>© 2026 GFE — All rights reserved</p>

</footer>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="js/jobseeker.js" type="module" defer></script>
  <script>
    document.getElementById('photoInput').addEventListener('change', function() {
  const file = this.files[0];
  if (file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const preview = document.getElementById('previewPhoto');
      preview.src = e.target.result;
      preview.style.display = 'block';
      document.querySelector('.person-icon').style.display = 'none';
      document.querySelector('.camera-icon').style.display = 'none';
    };
    reader.readAsDataURL(file);
  }
});
  </script>
</body>
</html>
