<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
        <img src="./Assets/GFE logo.png" alt="GFE logo" class="logo">
        <div class="login-dropdown ms-auto">
            <button class="btn btn-secondary dropdown-toggle login-btn" type="button" data-bs-toggle="dropdown">
            <img src="./Assets/menu-icon.png" class="menu-icon" alt="Menu">
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="./index.html">Home</a></li>
            <li><a class="dropdown-item" href="./about.html">About Us</a></li>
            <li><a class="dropdown-item" href="./contact.html">Contact Us</a></li>
            <li><a class="dropdown-item" href="#">FAQ</a></li>
            </ul>
        </div>
        </div>
    </nav>
    <div class="content">
        <div class="content-poster">
            <h1>Complete your profile</h1>
            <h2>Tell us a bit about yourself to get started.</h2>
        </div>
        <h5 class="mt-4">Step 1 of 4</h5>
        <div class="progress-custom mb-2">
            <div class="progress-bar-custom1"></div>
        </div>
        <div class="mb-4">
            <span class="dot active"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
        </div>
 
    <div class="profile-card">
        <div style="width: 200px;">
            <h4 class="fw-bold" style="color: #5A3AB0">Profile photo</h4>
            <small>Adding a photo helps clients recognize you and builds trust before reaching out.</small></div>
        <div class="profile-photo">
            <div class="photo-box">
                <i class="bi bi-camera camera-icon"></i>
                <i class="bi bi-person person-icon"></i>
            </div>
            <button class="btn mb-4 upload-btn">Upload photo</button>
        </div>
    </div>
    <h4 class="fw-bold mt-4">About you</h4>
      <form id="profileForm">
          <div class="mb-3">
          <input type="text" class="form-control" id="name" placeholder="Full name" required>
          </div>
          <div class="mb-3">
          <input type="text" class="form-control" id="location" placeholder="Location" required>
          </div>
          <button type="submit" class="btn w-100 next-btn" style="margin: 0px;">Next →</button>
      </form>
    <p class="add-logo">
      <img src="./Assets/GFE logo.png" alt="GFE logo" class="logo">
    </p>
    <div class="footer">
      <div class="footer-links">
        <p><a class="link" href="#">About Us</a></p>
        <p><a class="link" href="#">Contact Us</a></p>
        <p><a class="link" href="#">FAQ</a></p>
      </div>
      <div class="footer-copyright">
        <p>© 2026 GFE. All rights reserved.</p>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="js/profile.js" type="module"></script>
</body>
</html>
