  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
        <img src="./Assets/GFE logo.png" alt="GFE logo" class="logo">
        <div class="login-dropdown ms-auto">
            <button class="btn btn-secondary dropdown-toggle login-btn" type="button" data-bs-toggle="dropdown">
            <img src="./Assets/menu-icon.png" class="menu-icon" alt="Menu">
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="./index.html">Home</a></li>
            <li><a class="dropdown-item" href="./about.html">About Us</a></li>
            <li><a class="dropdown-item" href="./contact.html">Contact Us</a></li>
            <li><a class="dropdown-item" href="./faq.html">FAQ</a></li>
            </ul>
        </div>
        </div>
    </nav>
    <div class="content">
      <div class="content-poster">
          <h1>Complete your profile</h1>
          <h2>Choose a date and time that works best for you</h2>
      </div>
      <h5 class="mt-4">Step 3 of 4</h5>
      <div class="progress-custom mb-2">
          <div class="progress-bar-custom3"></div>
      </div>
      <div class="mb-4">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot active"></span>
          <span class="dot"></span>
      </div>
      <h4 class="fw-bold mt-4">My schedule</h4>
      <form id="profileForm">
        <!-- Date -->
        <div class="mb-3">
          <label>Date</label>
          <input type="date" class="form-control" >
        </div>
        <div class="mb-3">
          <label>Time</label>
          <div class="d-flex gap-2">
            <select class="form-select">
              <option value="" disabled selected>Select time</option>
              <option>08:00 AM</option>
              <option>09:00 AM</option>
              <option>10:00 AM</option>
              <option>11:00 AM</option>
              <option>12:00 AM</option>
              <option>01:00 PM</option>
              <option>02:00 PM</option>
              <option>03:00 PM</option>
              <option>04:00 PM</option>
              <option>05:00 PM</option>
            </select>
            <select class="form-select" >
              <option value="" disabled selected>End time</option>
              <option>09:00 AM</option>
              <option>10:00 AM</option>
              <option>11:00 AM</option>
              <option>12:00 AM</option>
              <option>01:00 PM</option>
              <option>02:00 PM</option>
              <option>03:00 PM</option>
              <option>04:00 PM</option>
              <option>05:00 PM</option>
              <option>06:00 PM</option>
            </select>
          </div>
        </div>
        <!-- Frequency -->
        <div>
          <label>Frequency</label>
          <div class="frequency-group mt-2">
            <button type="button" class="frequency-btn active">One time</button>
            <button type="button" class="frequency-btn">Weekly</button>
            <button type="button" class="frequency-btn">Bi-weekly</button>
          </div>
        </div>
        <div class="form-actions">
          <button type="button" class="back-btn" id="back2-btn1">Back</button>
          <button type="submit" class="next-btn" id="next3-btn1">Next →</button>
        </div>
      </form>

    <p class="add-logo">
      <img src="./Assets/GFE logo.png" alt="GFE logo" class="logo">
    </p>

  <div class="footer-links">

</footer>
