<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <nav class="navbar bg-body-tertiary fixed-top">
        <div class="container-fluid">
        <img src="./Assets/GFE logo.png" alt="GFE logo" class="logo">
        <div class="login-dropdown ms-auto">
            <button class="btn btn-secondary dropdown-toggle login-btn" type="button" data-bs-toggle="dropdown">
            <img src="./Assets/menu-icon.png" class="menu-icon" alt="Menu">
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="./index.html">Home</a></li>
            <li><a class="dropdown-item" href="./about.html">About Us</a></li>
            <li><a class="dropdown-item" href="./contact.html">Contact Us</a></li>
            <li><a class="dropdown-item" href="#">FAQ</a></li>
            </ul>
        </div>
        </div>
    </nav>
    <div class="content">
      <div class="content-poster">
          <h1>Complete your profile</h1>
          <h2>Share your experience and set your hourly rate.</h2>
      </div>
      <h5 class="mt-4">Step 3 of 4</h5>
      <div class="progress-custom mb-2">
          <div class="progress-bar-custom3"></div>
      </div>
      <div class="mb-4">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot active"></span>
          <span class="dot"></span>
      </div>
      <h4 class="fw-bold mt-4">Your experience and rate</h4>
      <p class="mt-2">Share your experience and set your hourly rate.</p>
      <form id="profileForm">
  
        <!-- Time -->
        <div class="mb-3">
          <label>Experience</label>
          <select class="form-select" required>
            <option value="" disabled selected>Select experience</option>
            <option>0-1 years</option>
            <option>1-3 years</option>
            <option>3-5 years</option>
            <option>5+ years</option>
          </select>
        </div>
        <div class="mb-3">
          <label>Set your hourly rate</label>  
          <select class="form-select mb-3" required>
            <option value="" disabled selected>Select your hourly rate</option>
            <option>€10 - €15/hour</option>
            <option>€15 - €20/hour</option>
            <option>€20 - €25/hour</option>
            <option>€25+ /hour</option>
          </select>
        </div>
        <div>
          <label class="mb-2">About your experience</label>
          <textarea rows="4" type="text" class="form-control mb-2" style="background-color: #f0e9f0"
          required
          placeholder="Describe your experience and the type of help you can offer (e.g. childcare, homework help, cleaning tasks, etc.)"></textarea>
        </div>
        <div>
          <label class="mb-2">Skills</label>
          <div class="form-actions mb-3 d-flex flex-wrap gap-3">
            <button type="checkbox" class="skills">Babysitting</button>
            <button type="checkbox" class="skills">Child supervision</button>
            <button type="checkbox" class="skills">Meal prepration for kids</button>
            <button type="checkbox" class="skills">Homework assistance</button>
            <button type="checkbox" class="skills">Playtime activities</button>
            <button type="checkbox" class="skills">Personal care assistance</button>
            <button type="checkbox" class="skills">Medication management</button>
            <button type="checkbox" class="skills">Mobility assistance</button>
            <button type="checkbox" class="skills">Meal prepration</button>
            <button type="checkbox" class="skills">Elder companionship</button>
            <button type="checkbox" class="skills">House Cleaning</button>
            <button type="checkbox" class="skills">Surface Cleaning</button>
            <button type="checkbox" class="skills">Deep Cleaning</button>
            <button type="checkbox" class="skills">Laundry</button>
          </div>
        </div>
        <div class="form-actions mb-3">
          <button type="button" class="back-btn">Back</button>
          <button type="submit" class="next-btn">Next →</button>
        </div>
      </form>

    <p class="add-logo">
      <img src="./Assets/GFE logo.png" alt="GFE logo" class="logo">
    </p>
    <div class="footer">
      <div class="footer-links">
        <p><a class="link" href="#">About Us</a></p>
        <p><a class="link" href="#">Contact Us</a></p>
        <p><a class="link" href="#">FAQ</a></p>
      </div>
      <div class="footer-copyright">
        <p>© 2026 GFE. All rights reserved.</p>
      </div>
    </div>
  </div>
  <script>
  const items = document.querySelectorAll(".service-item");
  let selectedService = "childcare";

  items.forEach(item => {
    item.addEventListener("click", () => {
      items.forEach(i => i.classList.remove("active"));
      item.classList.add("active");
      selectedService = item.dataset.value;
    });
  });
</script>
  <script>
    const buttons = document.querySelectorAll('.frequency-btn');

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  <script src="js/profile.js" type="module"></script>
</body>
</html>
