<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFE - Gig For Everyone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="jobseeker-job-offers-page">

  <div class="top-bar">
    <img src="./Assets/GFE logo.png" class="logo">
    <div class="right-side">
      <a href="index.html" class="logout-btn">Log out</a>
      <img src="./Assets/menu-icon.png" class="menu-icon" onclick="openMenu()">
    </div>
  </div>

  <div id="menuOverlay" class="menu-overlay" style="display: none;">
    <div class="menu-card">
      <div class="menu-top">
        <span class="close-btn" onclick="closeMenu()">✕</span>
      </div>
      <div class="menu-links">
        <a href="jobseeker-job-offers.html">Search</a>
        <a href="jobseeker-profile-page.html">My profile</a>
        <a href="jobseeker-dashboard.html">Dashboard</a>
        <a href="jobseeker-inbox.html">Messages</a>
        <a href="jobseeker-application.html">My applications</a>
        <a href="jobseeker-saved-jobs.html">❤️ Saved jobs</a>
      </div>
      <div class="menu-bottom">
        <a href="contact.html" class="help-btn">Need Help?</a>
        <a href="index.html" class="logout-small">Log out</a>
      </div>
    </div>
  </div>

  <div class="purple-bar2">
    <h3>Find jobs</h3>
    <p>Browse available jobs and apply easily.</p>
  </div>

  <div style="padding: 10px 20px;">
    <input type="text" id="search-input" placeholder="🔍 Search by title, location, service..." 
    style="width:100%; padding:10px; border:1px solid #ccc; border-radius:10px; background:#f0e9f0;">
  </div>

  <div class="service-section">
    <p class="service-title">Browse by service</p>
    <div class="service-buttons">
      <button class="service-btn" data-filter="childcare">👶 Childcare</button>
      <button class="service-btn" data-filter="elderly care">👵 Eldercare</button>
      <button class="service-btn" data-filter="cleaning">🧹 Cleaning</button>
    </div>
  </div>

  <div id="job-list"></div>
  
  <footer class="footer">
    <div class="footer-links">
      <a href="#">About us</a>
      <a href="#">Contact us</a>
      <a href="#">FAQ</a>
    </div>
    <div class="footer-line"></div>
    <p>© 2026 GFE — All rights reserved</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function openMenu() { document.getElementById("menuOverlay").style.display = "flex"; }
    function closeMenu() { document.getElementById("menuOverlay").style.display = "none"; }
  </script>

  <script type="module">
    import { Job } from "./js/class/Job.js";
    const job = new Job();
    const currentUser = JSON.parse(sessionStorage.getItem('user'));
    let allJobs = [];

    // render jobs function
    function renderJobs(list) {
      const container = document.getElementById("job-list");
      container.innerHTML = "";

      if (list.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:20px; color:#572290;">No jobs found!</p>';
        return;
      }

      list.forEach(jobItem => {
        const div = document.createElement("div");
        div.classList.add("job-card");
        div.dataset.id = jobItem.id;
        div.innerHTML = `
          <div class="job-top">
            <h4>${jobItem.service_title}</h4>
            <img src="./Assets/Heart@2x.png" class="heart-icon">
          </div>
          <p class="job-time">${jobItem.service_schedule}</p>
          <p class="apply-location">
            <img src="./Assets/location_on.png" class="location-icon">
            ${jobItem.service_location} • ${jobItem.service_pay_rate}
          </p>
          <p class="job-desc">${jobItem.service_description}</p>
          <div class="job-bottom">
            <button class="details-btn">View details</button>
          </div>
        `;
        container.appendChild(div);
      });

      // heart icons
      document.querySelectorAll(".heart-icon").forEach(icon => {
        const jobCard = icon.closest(".job-card");
        const jobTitle = jobCard.querySelector("h4").textContent;
        const jobTime = jobCard.querySelector(".job-time").textContent;
        const jobLocation = jobCard.querySelector(".apply-location").textContent.trim();
        const jobDesc = jobCard.querySelector(".job-desc").textContent.trim();

        let savedJobs = JSON.parse(localStorage.getItem("savedJobs")) || [];
        if (savedJobs.find(j => j.title === jobTitle)) {
          icon.src = "./Assets/filled-heart.png";
        }

        icon.addEventListener("click", () => {
          let savedJobs = JSON.parse(localStorage.getItem("savedJobs")) || [];
          if (icon.src.includes("Heart@2x")) {
            icon.src = "./Assets/filled-heart.png";
            savedJobs.push({ title: jobTitle, time: jobTime, location: jobLocation, desc: jobDesc });
          } else {
            icon.src = "./Assets/Heart@2x.png";
            savedJobs = savedJobs.filter(j => j.title !== jobTitle);
          }
          localStorage.setItem("savedJobs", JSON.stringify(savedJobs));
        });
      });

      // view details buttons
      document.querySelectorAll(".details-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          const jobCard = btn.closest(".job-card");
          const jobId = jobCard.dataset.id;
          window.location.href = `jobseeker-job-details-page.html?id=${jobId}`;
        });
      });
    }

    // load all jobs on page load
    async function loadAllJobs() {
      try {
        const response = await fetch('http://localhost:3001/job/find', {
          headers: { 'Authorization': `Bearer ${currentUser.token}` }
        });
        allJobs = await response.json();
        renderJobs(allJobs);
      } catch (err) {
        console.error('Failed to load jobs:', err);
      }
    }

    // service filter buttons
    document.querySelectorAll(".service-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        document.querySelectorAll(".service-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        const service = btn.dataset.filter;
        const filtered = allJobs.filter(j => j.service_type === service);
        renderJobs(filtered);
        // clear search
        document.getElementById('search-input').value = '';
      });
    });

    // search
    document.getElementById('search-input').addEventListener('input', function() {
      const query = this.value.toLowerCase();
      // clear active service filter
      document.querySelectorAll(".service-btn").forEach(b => b.classList.remove("active"));
      const filtered = allJobs.filter(job =>
        job.service_title.toLowerCase().includes(query) ||
        job.service_location.toLowerCase().includes(query) ||
        job.service_type.toLowerCase().includes(query)
      );
      renderJobs(filtered);
    });

    loadAllJobs();
  </script>

</body>
</html>
