<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFE - Saved Jobs</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="jobseeker-saved-page">

  <div class="top-bar">
    <img src="./Assets/GFE logo.png" class="logo">
    <div class="right-side">
      <a href="index.html" class="logout-btn">Log out</a>
      <img src="./Assets/menu-icon.png" class="menu-icon" onclick="openMenu()">
    </div>
  </div>

  <div id="menuOverlay" class="menu-overlay" style="display: none;">
    <div class="menu-card">
      <div class="menu-top">
        <span class="close-btn" onclick="closeMenu()">✕</span>
      </div>
      <div class="menu-links">
        <a href="jobseeker-job-offers.html">Search</a>
        <a href="jobseeker-profile-page.html">My profile</a>
        <a href="jobseeker-dashboard.html">Dashboard</a>
        <a href="jobseeker-inbox.html">Messages</a>
        <a href="jobseeker-application.html">My applications</a>
      </div>
      <div class="menu-bottom">
        <a href="contact.html" class="help-btn">Need Help?</a>
        <a href="index.html" class="logout-small">Log out</a>
      </div>
    </div>
  </div>

  <section class="saved-header">
    <h2>Saved jobs</h2>
    <p>Jobs you liked or saved</p>
  </section>

  <div class="saved-container" id="savedContainer">
    <!-- jobs will be loaded here from localStorage -->
  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="#">About us</a>
      <a href="#">Contact us</a>
      <a href="#">FAQ</a>
    </div>
    <div class="footer-line"></div>
    <p>© 2026 GFE — All rights reserved</p>
  </footer>

  <script>
    function loadSavedJobs() {
      const savedJobs = JSON.parse(localStorage.getItem("savedJobs")) || [];
      const container = document.getElementById("savedContainer");
      container.innerHTML = "";

      if (savedJobs.length === 0) {
        container.innerHTML = "<p style='text-align:center; color:#572290; margin-top:20px;'>No saved jobs yet!</p>";
        return;
      }

      savedJobs.forEach(job => {
        const card = document.createElement("div");
        card.className = "job-card";
        card.innerHTML = `
          <div class="job-top">
            <h4>${job.title}</h4>
            <img src="./Assets/filled-heart.png" class="heart-icon">
          </div>
          <p class="job-time">${job.time}</p>
          <p>
            <img src="./Assets/location_on.png" class="location-icon">
            ${job.location}
          </p>
          <p class="job-desc">${job.desc}</p>
          <div class="job-actions">
            <button class="remove-btn">Remove</button>
            <a href="jobseeker-job-details-page.html" class="apply-btn">Apply Now</a>
          </div>
        `;

        // remove button
        card.querySelector(".remove-btn").addEventListener("click", () => {
          let savedJobs = JSON.parse(localStorage.getItem("savedJobs")) || [];
          savedJobs = savedJobs.filter(j => j.title !== job.title);
          localStorage.setItem("savedJobs", JSON.stringify(savedJobs));
          card.remove();
        });

        container.appendChild(card);
      });
    }

    loadSavedJobs();

    function openMenu() {
      document.getElementById("menuOverlay").style.display = "flex";
    }

    function closeMenu() {
      document.getElementById("menuOverlay").style.display = "none";
    }
  </script>

</body>
</html>
