<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFE - My Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="Client-profile-page">

  <div class="top-bar">
    <img src="./Assets/GFE logo.png" class="logo">
    <div class="right-side">
      <a href="index.html" class="logout-btn">Log out</a>
      <img src="./Assets/menu-icon.png" class="menu-icon" onclick="openMenu()">
    </div>
  </div>

  <div id="menuOverlay" class="menu-overlay" style="display: none;">
    <div class="menu-card">
      <div class="menu-top">
        <span class="close-btn" onclick="closeMenu()">✕</span>
      </div>
      <div class="menu-links">
        <a href="client-jobdetails.html">Search</a>
        <a href="client-dashboard.html">Dashboard</a>
        <a href="client-profile.html">My profile</a>
        <a href="client-inbox.html">Messages</a>
        <a href="client-post.html">Post a job</a>
        
      </div>
      <div class="menu-bottom">
        <a href="contact.html" class="help-btn">Need Help?</a>
        <a href="index.html" class="logout-small">Log out</a>
      </div>
    </div>
  </div>

  <div class="profile-container">

    <div class="profile-header">
      <img src="" class="profile-img" id="profile-img">
      <div class="profile-info">
        <h4 id="profile-name"></h4>
        <p id="profile-location-text"></p>
      </div>
    </div>

    <div class="profile-rating"></div>

    <div class="profile-section">
      <h4>About me</h4>
      <div class="profile-box">
        <p id="about-text"></p>
      </div>
    </div>

    <div class="profile-section">
      <div class="profile-box">
        <div class="exp-row">
          <label>👤 Name</label>
          <div class="exp-value" id="name-text"></div>
        </div>
        <div class="exp-row">
          <label>📞 Phone</label>
          <div class="exp-value" id="phone-text"></div>
        </div>
        <div class="exp-row">
          <label>📧 Email</label>
          <div class="exp-value" id="email-text"></div>
        </div>
        <div class="exp-row">
          <label>📍 Location</label>
          <div class="exp-value" id="location-text"></div>
        </div>
      </div>
    </div>

    <div class="profile-section">
      <h4>My Job ads</h4>
      <div class="tags" id="services-tags"></div>
    </div>


    

    <div class="profile-section">
      <h4>Change password</h4>
      <div class="profile-box">
        <div class="exp-row">
          <label>Current password</label>
          <input type="password" id="current-password" style="border:1px solid #ccc; border-radius:8px; padding:5px; background:#e9def5; width:100%;">
        </div>
        <div class="exp-row">
          <label>New password</label>
          <input type="password" id="new-password" style="border:1px solid #ccc; border-radius:8px; padding:5px; background:#e9def5; width:100%;">
        </div>
        <div class="exp-row">
          <label>Confirm password</label>
          <input type="password" id="confirm-password" style="border:1px solid #ccc; border-radius:8px; padding:5px; background:#e9def5; width:100%;">
        </div>
        <button id="change-password-btn" style="background: linear-gradient(to right, #7b3fe4, #3B1664); color:white; border:none; padding:8px 16px; border-radius:10px; margin-top:10px;">Change password</button>
      </div>
    </div>

    <div class="profile-actions">
      <button class="edit-btn" id="editBtn">Edit your profile</button>
      <button class="pause-btn" style="background:#e4dbe6;">Pause your application</button>
      <button class="delete-btn">Delete account</button>
    </div>

  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="about.html">About us</a>
      <a href="contact.html">Contact us</a>
      <a href="faq.html">FAQ</a>
    </div>
    <div class="footer-line"></div>
    <p>© 2026 GFE — All rights reserved</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

  <script>
  const currentUser = JSON.parse(sessionStorage.getItem('user'));

  if (currentUser) {
    fetch(`http://localhost:3001/user/${currentUser.id}`)
      .then(res => res.json())
      .then(user => {
        document.getElementById('profile-name').textContent = user.fullname ? user.fullname.split(' ')[0] : '';
        document.getElementById('profile-location-text').textContent = user.location || '';

        if (user.photo) {
          document.getElementById('profile-img').src = `http://localhost:3001/uploads/${user.photo}`;
        } else {
          document.getElementById('profile-img').src = './Assets/candidate img2.png';
        }

        document.getElementById('about-text').textContent = user.about_you || 'No description added yet';
        document.getElementById('name-text').textContent = user.fullname || '';
        document.getElementById('phone-text').textContent = user.contact_phone || '';
        document.getElementById('email-text').textContent = user.contact_email || '';
        document.getElementById('location-text').textContent = user.location || '';
        
        const pauseBtn = document.querySelector('.pause-btn');
        if (user.is_paused) {
          pauseBtn.textContent = 'Resume application';
          pauseBtn.style.background = '#ccc';
        }

        if (user.services) {
          document.getElementById('services-tags').innerHTML = `<span class="tag">${user.services}</span>`;
        }


        document.querySelector('.profile-container').style.visibility = 'visible';
      });
  }

  let isEditing = false;

  const districts = {
    Helsinki: ['Kamppi', 'Kallio', 'Lauttasaari', 'Töölö', 'Pasila', 'Malmi', 'Haaga'],
    Espoo: ['Matinkylä', 'Otaniemi', 'Tapiola', 'Leppävaara', 'Espoonlahti'],
    Vantaa: ['Tikkurila', 'Myyrmäki', 'Hakunila', 'Martinlaakso'],
    Tampere: ['Kaleva', 'Pyynikki', 'Hervanta', 'Tammela'],
    Turku: ['Hirvensalo', 'Nummi', 'Runosmäki', 'Kupittaa'],
    Oulu: ['Linnanmaa', 'Rajakylä', 'Keskusta', 'Tuira']
  };

  document.getElementById('editBtn').addEventListener('click', function() {
    if (!isEditing) {
      isEditing = true;
      this.textContent = 'Save profile';

      const about = document.getElementById('about-text');
      about.innerHTML = `<textarea id="edit-about" style="width:100%; border:none; border-radius:8px; padding:8px; background:#e9def5; min-height:120px;">${about.innerText}</textarea>`;

      const name = document.getElementById('name-text');
      name.innerHTML = `<input id="edit-name" type="text" value="${name.innerText}" style="border:1px solid #ccc; border-radius:8px; padding:5px; background:#e9def5; width:100%;">`;

      const phone = document.getElementById('phone-text');
      phone.innerHTML = `<input id="edit-phone" type="text" value="${phone.innerText}" style="border:1px solid #ccc; border-radius:8px; padding:5px; background:#e9def5; width:100%;">`;

      const email = document.getElementById('email-text');
      email.innerHTML = `<input id="edit-email" type="email" value="${email.innerText}" style="border:1px solid #ccc; border-radius:8px; padding:5px; background:#e9def5; width:100%;">`;

      const loc = document.getElementById('location-text');
      loc.innerHTML = `
        <select id="edit-city" class="form-select mb-2" style="background:#e9def5;">
          <option value="">Select city</option>
          <option>Helsinki</option>
          <option>Espoo</option>
          <option>Vantaa</option>
          <option>Tampere</option>
          <option>Turku</option>
          <option>Oulu</option>
        </select>
        <select id="edit-district" class="form-select" style="background:#e9def5;">
          <option value="">Select district</option>
        </select>
      `;

      document.getElementById('edit-city').addEventListener('change', function() {
        const districtSelect = document.getElementById('edit-district');
        districtSelect.innerHTML = '<option value="">Select district</option>';
        if (districts[this.value]) {
          districts[this.value].forEach(d => {
            const opt = document.createElement('option');
            opt.value = d;
            opt.textContent = d;
            districtSelect.appendChild(opt);
          });
        }
      });


    } else {
      isEditing = false;
      this.textContent = 'Edit your profile';

      const aboutVal = document.getElementById('edit-about').value;
      const nameVal = document.getElementById('edit-name').value;
      const phoneVal = document.getElementById('edit-phone').value;
      const emailVal = document.getElementById('edit-email').value;
      const city = document.getElementById('edit-city').value;
      const district = document.getElementById('edit-district').value;
      const locVal = district ? `${city} - ${district}` : city;

      document.getElementById('about-text').innerHTML = aboutVal;
      document.getElementById('name-text').textContent = nameVal;
      document.getElementById('phone-text').textContent = phoneVal;
      document.getElementById('email-text').textContent = emailVal;
      document.getElementById('location-text').textContent = locVal;
      document.getElementById('profile-location-text').textContent = city;

      fetch('http://localhost:3001/user/profile', {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${currentUser.token}`
        },
        body: JSON.stringify({
          fullname: nameVal,
          contact_phone: phoneVal,
          contact_email: emailVal,
          location: locVal,
          about_you: aboutVal,
        })
      })
      .then(res => res.json())
      .then(() => alert('Profile saved! ✅'))
      .catch(err => console.error(err));
    }
  });

  document.querySelector(".pause-btn").addEventListener("click", function() {
    fetch('http://localhost:3001/user/pause', {
      method: 'PUT',
      headers: { 'Authorization': `Bearer ${currentUser.token}` }
    })
    .then(res => res.json())
    .then(data => {
      if (data.is_paused) {
        this.textContent = 'Resume application';
        this.style.background = '#ccc';
      } else {
        this.textContent = 'Pause your application';
        this.style.background = '#e4dbe6';
      }
    });
  });

  document.querySelector(".delete-btn").addEventListener("click", () => {
    if (confirm("Are you sure you want to delete your account? This cannot be undone!")) {
      fetch(`http://localhost:3001/user/${currentUser.id}`, {
        method: 'DELETE',
        headers: { 'Authorization': `Bearer ${currentUser.token}` }
      })
      .then(res => res.json())
      .then(() => {
        alert('Account deleted!');
        sessionStorage.clear();
        window.location.href = 'index.html';
      })
      .catch(err => console.error(err));
    }
  });

  document.getElementById('change-password-btn').addEventListener('click', () => {
    const currentPassword = document.getElementById('current-password').value;
    const newPassword = document.getElementById('new-password').value;
    const confirmPassword = document.getElementById('confirm-password').value;

    if (!currentPassword || !newPassword || !confirmPassword) {
      alert('Please fill in all password fields!');
      return;
    }

    if (newPassword !== confirmPassword) {
      alert('New passwords do not match!');
      return;
    }

    fetch('http://localhost:3001/user/change-password', {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${currentUser.token}`
      },
      body: JSON.stringify({ currentPassword, newPassword })
    })
    .then(res => res.json())
    .then(data => {
      if (data.error) {
        alert('Error: ' + data.error);
      } else {
        alert('Password changed successfully! ✅');
        document.getElementById('current-password').value = '';
        document.getElementById('new-password').value = '';
        document.getElementById('confirm-password').value = '';
      }
    })
    .catch(err => console.error(err));
  });

  document.querySelectorAll('.tag, .tasks span').forEach(tag => {
    tag.addEventListener('click', () => {
      tag.classList.toggle('active');
    });
  });

  function openMenu() { document.getElementById("menuOverlay").style.display = "flex"; }
  function closeMenu() { document.getElementById("menuOverlay").style.display = "none"; }
  </script>

</body>
</html>
