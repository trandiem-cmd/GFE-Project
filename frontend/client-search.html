<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFE - Gig For Everyone</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar bg-body-tertiary fixed-top">
    <div class="container-fluid">
      <img src="./Assets/GFE logo.png" alt="GFE logo" class="logo">
    <div class="login-dropdown ms-auto">
      <a class="login-btn" href="#">Sign up</a>
      <button class="btn btn-secondary dropdown-toggle login-btn" type="button" data-bs-toggle="dropdown">
          <img src="./Assets/menu-icon.png" class="menu-icon" alt="Menu">
      </button>
        <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" href="./index.html">Home</a></li>
            <li><a class="dropdown-item" href="./about.html">About Us</a></li>
            <li><a class="dropdown-item" href="./contact.html">Contact Us</a></li>
            <li><a class="dropdown-item" href="#">FAQ</a></li>
        </ul>
      </div>
    </div>
  </nav>
<div class="container">

  <h3>Looking for a worker?</h3>
  <h3>GFE helps you find trusted local help!</h3>

  <div class="buttons">
    <button onclick="showCard('childcare')" class="active">👶 Childcare</button>
    <button onclick="showCard('cleaning')">🧼 Cleaning</button>
    <button onclick="showCard('elderly')">👵 Elderly Care</button>
  </div>

  <!-- Card -->
  <div id="card" class="card"></div>

</div>

<script>
  const cardData = {
    childcare: {
      title: "CHILDCARE",
      img: "https://images.unsplash.com/photo-1588072432836-e10032774350",
      text: "Finding childcare is about more than availability , It is about trust, safety, and choosing someone who fits your family. GFE helps parents discover trusted local babysitters and nannies for everyday support, after-school care, evenings out, and flexible last-minute help. View profiles, compare experience, read reviews from real people, and book childcare that works for your home, your routine, and your child.",
    },
    cleaning: {
      title: "CLEANING",
      img: "https://images.unsplash.com/photo-1581578731548-c64695cc6952",
      text: "Professional cleaners help keep your home spotless. Book trusted cleaners for regular or deep cleaning services.",
    },
    elderly: {
      title: "ELDERLY CARE",
      img: "https://images.unsplash.com/photo-1584515933487-779824d29309",
      text: "Compassionate caregivers provide support for elderly loved ones, ensuring comfort, safety, and companionship.",
    }
  };

  function showCard(type) {
    const data = cardData[type];

    document.getElementById("card").innerHTML = `
      <img src="${data.img}" alt="">
      <h3>${data.title}</h3>
      <p>${data.text}</p>
      <a href="#" class="btn">Find workers</a>
    `;

    // update active button
    document.querySelectorAll(".buttons button").forEach(btn => {
      btn.classList.remove("active");
    });

    event.target.classList.add("active");
  }

  // Load default card
  showCard('childcare');
</script>
  <div class="footer">
    <div class="footer-links">
        <p><a class="link" href="#">About Us</a></p>
        <p><a class="link" href="#">Contact Us</a></p>
        <p><a class="link" href="#">FAQ</a></p>
    </div>
    <div class="footer-copyright">
        <p>© 2026 GFE. All rights reserved.</p>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
