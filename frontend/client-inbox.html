<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GFE - Client Inbox</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body class="client-inbox-page">

  <div class="inbox-container">

    <div class="top-bar">
      <img src="./Assets/GFE logo.png" class="logo">
      <div class="right-side">
        <img src="./Assets/mark_email_unread (2).png" class="inbox-icon">
        <a href="index.html" class="logout-btn">Log out</a>
      </div>
    </div>

    <div class="inbox-header">
      <h3 class="inbox-title">Messages</h3>
      <p class="inbox-sub">
        Stay connected with candidates and manage your conversations easily.
      </p>
    </div>

    <div class="message-item active">
  <img src="./Assets/candidate img1.png" class="profile-icon">
  <div>
    <strong>Emma Watson</strong><br>
    <small class="service-label">Childcare provider</small>
    <p>Hi! I'm available this weekend 😊</p>
  </div>
  <span class="badge">1</span>
</div>

<div class="message-item">
  <img src="./Assets/candidate img2.png" class="profile-icon">
  <div>
    <strong>John Smith</strong><br>
    <small class="service-label">Cleaner</small>
    <p>Can you share more details</p>
  </div>
</div>

    <div class="chat-name" id="chatName">Emma Watson</div>

    <div class="chat-box" id="chatBox"></div>

    <div class="chat-input">
      <input type="text" placeholder="Type a message...">
      <button class="send-btn">➤</button>
    </div>

  </div>

  <footer class="footer">
    <div class="footer-links">
      <a href="#">About us</a>
      <a href="#">Contact us</a>
      <a href="#">FAQ</a>
    </div>
    <div class="footer-line"></div>
    <p>© 2026 GFE — All rights reserved</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script>
const BACKEND_URL = "http://localhost:3001";

const userFromStorage = sessionStorage.getItem('user');
const currentUser = JSON.parse(userFromStorage);

async function loadMessages() {
  const response = await fetch(`${BACKEND_URL}/inbox/${currentUser.id}`);
  const messages = await response.json();

  const chatBox = document.getElementById('chatBox');
  chatBox.innerHTML = '';

  messages.forEach(msg => {
    const div = document.createElement('div');
    div.className = msg.sender_id === currentUser.id ? 'chat-message right' : 'chat-message left';
    div.textContent = msg.message_text;
    chatBox.appendChild(div);
  });
}

document.querySelector('.chat-input button').addEventListener('click', async () => {
  const input = document.querySelector('.chat-input input');
  const message = input.value.trim();

  if (message !== '') {
    await fetch(`${BACKEND_URL}/inbox`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        sender_id: currentUser.id,
        receiver_id: 5,
        message_text: message
      })
    });

    input.value = '';
    loadMessages();
  }
});

document.querySelector('.chat-input input').addEventListener('keypress', e => {
  if (e.key === 'Enter') {
    document.querySelector('.chat-input button').click();
  }
});

loadMessages();
  </script>

</body>
</html>
